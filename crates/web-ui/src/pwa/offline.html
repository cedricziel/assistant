<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#020611">
  <title>Offline - Assistant</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #030712;
      color: #e5e9f0;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .offline-card {
      text-align: center;
      max-width: 400px;
      padding: 40px 24px;
    }
    .offline-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      color: #5a7396;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 12px;
      color: #e5e9f0;
    }
    p {
      font-size: 0.95rem;
      color: #8aa5d8;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .btn-retry {
      display: inline-block;
      background: rgba(110, 198, 255, 0.12);
      border: 1px solid rgba(110, 198, 255, 0.25);
      border-radius: 8px;
      color: #6ec6ff;
      padding: 10px 24px;
      font-size: 0.9rem;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-retry:hover {
      background: rgba(110, 198, 255, 0.2);
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <svg class="offline-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
    <h1>You're offline</h1>
    <p>
      Assistant needs a network connection to load this page.
      Previously visited pages may still be available.
    </p>
    <button class="btn-retry" onclick="window.location.reload()">
      Try again
    </button>
  </div>
</body>
</html>
