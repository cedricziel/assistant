<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{% block title %}{% endblock %} - Assistant</title>

  <!-- PWA -->
  <link rel="manifest" href="/pwa/manifest.webmanifest">
  <meta name="theme-color" content="#020611">
  <meta name="color-scheme" content="dark">

  <!-- Apple PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Assistant">
  <link rel="apple-touch-icon" href="/pwa/icon.svg">

  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
  <style>
    /* -- Reset & base ---------------------------------------------------- */
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #030712;
      color: #e5e9f0;
      overflow: hidden;
      height: 100dvh;
    }
    a { color: #6ec6ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    button { cursor: pointer; font-family: inherit; }

    /* -- App shell grid -------------------------------------------------- */
    .app-shell {
      display: grid;
      grid-template-columns: 48px 1fr;
      grid-template-rows: 1fr;
      height: 100dvh;
      overflow: hidden;
    }

    /* -- Icon rail (desktop) --------------------------------------------- */
    .icon-rail {
      background: #020611;
      border-right: 1px solid #0f1f36;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
      gap: 4px;
      z-index: 20;
    }
    .rail-brand {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, #64cafe, #8b5dff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: #030712;
      margin-bottom: 12px;
      flex-shrink: 0;
    }
    .rail-item {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #5a7396;
      transition: background 0.15s, color 0.15s;
      text-decoration: none;
    }
    .rail-item:hover {
      background: rgba(110, 198, 255, 0.08);
      color: #9ccfff;
      text-decoration: none;
    }
    .rail-item.active {
      background: rgba(110, 198, 255, 0.12);
      color: #6ec6ff;
    }
    .rail-item svg { width: 20px; height: 20px; }
    .rail-spacer { flex: 1; }
    .rail-divider {
      width: 24px;
      height: 1px;
      background: #0f1f36;
      margin: 4px 0;
    }

    /* -- App content area ------------------------------------------------ */
    .app-content {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* -- Top bar / breadcrumb -------------------------------------------- */
    .top-bar {
      height: 48px;
      min-height: 48px;
      border-bottom: 1px solid #0f1f36;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      background: #020611;
    }
    .hamburger {
      display: none;
      background: none;
      border: none;
      color: #8aa5d8;
      font-size: 20px;
      padding: 4px;
    }
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      min-width: 0;
    }
    .breadcrumb-sep { color: #2a3d5a; }
    .breadcrumb-page { color: #8aa5d8; }
    .breadcrumb-current {
      color: #e5e9f0;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .top-bar-spacer { flex: 1; }
    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-signout {
      background: transparent;
      border: 1px solid #1a2744;
      border-radius: 6px;
      color: #8aa5d8;
      padding: 4px 12px;
      font-size: 0.8rem;
      transition: background 0.15s, color 0.15s;
    }
    .btn-signout:hover {
      background: rgba(239, 68, 68, 0.12);
      color: #fca5a5;
      border-color: rgba(239, 68, 68, 0.3);
    }
    .back-link {
      display: none;
      color: #6ec6ff;
      font-size: 0.85rem;
      align-items: center;
      gap: 4px;
    }
    .back-link svg { width: 16px; height: 16px; }

    /* -- Main content ---------------------------------------------------- */
    .content-area {
      flex: 1;
      overflow: hidden;
      display: flex;
    }

    /* -- Bottom tab bar (mobile) ----------------------------------------- */
    .bottom-tabs {
      display: none;
      background: #020611;
      border-top: 1px solid #0f1f36;
      padding: 4px 0 env(safe-area-inset-bottom, 4px);
    }
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 6px 0;
      color: #5a7396;
      text-decoration: none;
      font-size: 0.65rem;
      transition: color 0.15s;
      min-width: 0;
    }
    .tab-item:hover { text-decoration: none; }
    .tab-item.active { color: #6ec6ff; }
    .tab-item svg { width: 20px; height: 20px; }

    /* -- Drawer (tablet slide-over) -------------------------------------- */
    .drawer-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 40;
    }
    .drawer-backdrop.open { display: block; }
    .drawer {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 280px;
      background: #050f21;
      border-right: 1px solid #0f1f36;
      z-index: 50;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      padding: 20px 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .drawer.open { transform: translateX(0); }
    .drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .drawer-brand {
      font-weight: 700;
      font-size: 1rem;
      color: #e5e9f0;
    }
    .drawer-close {
      background: none;
      border: none;
      color: #8aa5d8;
      font-size: 20px;
      padding: 4px;
    }
    .drawer-nav {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .drawer-nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      color: #c2d6f0;
      text-decoration: none;
      font-size: 0.9rem;
      transition: background 0.15s;
    }
    .drawer-nav-item:hover {
      background: rgba(110, 198, 255, 0.08);
      text-decoration: none;
    }
    .drawer-nav-item.active {
      background: rgba(110, 198, 255, 0.12);
      color: #6ec6ff;
    }
    .drawer-nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
    .drawer-divider {
      height: 1px;
      background: #0f1f36;
      margin: 4px 0;
    }

    /* -- Responsive: tablet (640-900px) ---------------------------------- */
    @media (max-width: 900px) {
      .app-shell {
        grid-template-columns: 1fr;
      }
      .icon-rail { display: none; }
      .hamburger { display: flex; }
    }

    /* -- Responsive: mobile (<640px) ------------------------------------- */
    @media (max-width: 640px) {
      .app-shell {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr auto;
      }
      .icon-rail { display: none; }
      .hamburger { display: none; }
      .top-bar { display: none; }
      .bottom-tabs {
        display: flex;
        justify-content: space-around;
      }
      .btn-signout { display: none; }
    }

    /* -- Page-specific CSS block ----------------------------------------- */
    {% block extra_css %}{% endblock %}
  </style>
</head>
<body>
  <div class="app-shell">
    <!-- Icon rail (desktop) -->
    <nav class="icon-rail" aria-label="Main navigation">
      <div class="rail-brand">A</div>

      <a href="/chat" class="rail-item{% if active_page == "chat" %} active{% endif %}" title="Chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </a>

      <div class="rail-divider"></div>

      <a href="/traces" class="rail-item{% if active_page == "traces" %} active{% endif %}" title="Traces">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
      </a>
      <a href="/logs" class="rail-item{% if active_page == "logs" %} active{% endif %}" title="Logs">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
      </a>
      <a href="/analytics" class="rail-item{% if active_page == "analytics" %} active{% endif %}" title="Analytics">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
      </a>

      <div class="rail-divider"></div>

      <a href="/agents" class="rail-item{% if active_page == "agents" %} active{% endif %}" title="Agents">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="3"/>
          <line x1="9" y1="16" x2="9" y2="16.01"/><line x1="15" y1="16" x2="15" y2="16.01"/>
        </svg>
      </a>
      <a href="/webhooks" class="rail-item{% if active_page == "webhooks" %} active{% endif %}" title="Webhooks">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
      </a>

      <div class="rail-spacer"></div>

      <form method="POST" action="/logout" style="margin:0">
        <button type="submit" class="rail-item" title="Sign out" style="border:none;background:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </form>
    </nav>

    <!-- App content -->
    <div class="app-content">
      <!-- Top bar -->
      <header class="top-bar">
        <button class="hamburger" onclick="toggleDrawer()" aria-label="Menu">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        {% block back_link %}{% endblock %}
        <nav class="breadcrumb">
          {% block breadcrumb %}{% endblock %}
        </nav>
        <div class="top-bar-spacer"></div>
        <div class="top-bar-right">
          <form method="POST" action="/logout" style="margin:0">
            <button type="submit" class="btn-signout">Sign out</button>
          </form>
        </div>
      </header>

      <!-- Main content -->
      <main class="content-area">
        {% block content %}{% endblock %}
      </main>
    </div>

    <!-- Bottom tabs (mobile) -->
    <nav class="bottom-tabs" aria-label="Main navigation">
      <a href="/chat" class="tab-item{% if active_page == "chat" %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Chat
      </a>
      <a href="/traces" class="tab-item{% if active_page == "traces" %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        Traces
      </a>
      <a href="/analytics" class="tab-item{% if active_page == "analytics" %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        Dash
      </a>
      <a href="/logs" class="tab-item{% if active_page == "logs" %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
        </svg>
        Logs
      </a>
      <a href="/agents" class="tab-item{% if active_page == "agents" %} active{% endif %}{% if active_page == "webhooks" %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="3"/>
        </svg>
        More
      </a>
    </nav>
  </div>

  <!-- Slide-over drawer (tablet) -->
  <div class="drawer-backdrop" id="drawerBackdrop" onclick="toggleDrawer()"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-header">
      <span class="drawer-brand">Assistant</span>
      <button class="drawer-close" onclick="toggleDrawer()">&times;</button>
    </div>
    <nav class="drawer-nav">
      <a href="/chat" class="drawer-nav-item{% if active_page == "chat" %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Chat
      </a>
      <div class="drawer-divider"></div>
      <a href="/traces" class="drawer-nav-item{% if active_page == "traces" %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        Traces
      </a>
      <a href="/logs" class="drawer-nav-item{% if active_page == "logs" %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
        Logs
      </a>
      <a href="/analytics" class="drawer-nav-item{% if active_page == "analytics" %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        Analytics
      </a>
      <div class="drawer-divider"></div>
      <a href="/agents" class="drawer-nav-item{% if active_page == "agents" %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="3"/>
        </svg>
        Agents
      </a>
      <a href="/webhooks" class="drawer-nav-item{% if active_page == "webhooks" %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        Webhooks
      </a>
    </nav>
    <div class="drawer-divider"></div>
    {% block drawer_extra %}{% endblock %}
    <div style="margin-top:auto">
      <form method="POST" action="/logout">
        <button type="submit" class="btn-signout" style="width:100%">Sign out</button>
      </form>
    </div>
  </aside>

  <script>
    function toggleDrawer() {
      document.getElementById('drawer').classList.toggle('open');
      document.getElementById('drawerBackdrop').classList.toggle('open');
    }

    // -- Service Worker registration --
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .then(function(reg) {
            // Check for updates periodically (every 60s)
            setInterval(function() { reg.update(); }, 60000);
          });
      });
    }
  </script>
  {% block extra_js %}{% endblock %}
</body>
</html>
