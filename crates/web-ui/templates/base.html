<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{% block title %}{% endblock %} - Assistant</title>

  <!-- PWA -->
  <link rel="manifest" href="/pwa/manifest.webmanifest">
  <meta name="theme-color" content="#020611">
  <meta name="color-scheme" content="dark">

  <!-- Apple PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Assistant">
  <link rel="apple-touch-icon" href="/pwa/icon.svg">

  <script type="importmap">{"imports":{"htmx.org":"{{ self.htmx_url() }}","htmx-ext-sse":"{{ self.htmx_sse_url() }}"}}</script>
  <script src="{{ self.htmx_url() }}"></script>
  <script src="{{ self.htmx_sse_url() }}"></script>
  <link rel="stylesheet" href="{{ self.app_css_url() }}">
  <style>{% block extra_css %}{% endblock %}</style>
</head>
<body>
  <div class="app-shell">
    <!-- Icon rail (desktop) -->
    <nav class="icon-rail" aria-label="Main navigation">
      <div class="rail-brand">A</div>

      <a href="/chat" class="rail-item{% if active_page == "chat" %} active{% endif %}" title="Chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </a>

      <div class="rail-divider"></div>

      <a href="/traces" class="rail-item{% if active_page == "traces" %} active{% endif %}" title="Traces">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
      </a>
      <a href="/logs" class="rail-item{% if active_page == "logs" %} active{% endif %}" title="Logs">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
      </a>
      <a href="/analytics" class="rail-item{% if active_page == "analytics" %} active{% endif %}" title="Analytics">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
      </a>

      <div class="rail-divider"></div>

      <a href="/agents" class="rail-item{% if active_page == "agents" %} active{% endif %}" title="Agents">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="3"/>
          <line x1="9" y1="16" x2="9" y2="16.01"/><line x1="15" y1="16" x2="15" y2="16.01"/>
        </svg>
      </a>
      <a href="/webhooks" class="rail-item{% if active_page == "webhooks" %} active{% endif %}" title="Webhooks">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
      </a>

      <div class="rail-spacer"></div>

      <form method="POST" action="/logout" style="margin:0">
        <button type="submit" class="rail-item" title="Sign out" style="border:none;background:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </form>
    </nav>

    <!-- App content -->
    <div class="app-content">
      <!-- Top bar -->
      <header class="top-bar">
        <button class="hamburger" aria-label="Menu">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        {% block back_link %}{% endblock %}
        <nav class="breadcrumb">
          {% block breadcrumb %}{% endblock %}
        </nav>
        <div class="top-bar-spacer"></div>
        <div class="top-bar-right">
          <form method="POST" action="/logout" style="margin:0">
            <button type="submit" class="btn-signout">Sign out</button>
          </form>
        </div>
      </header>

      <!-- Main content -->
      <main class="content-area">
        {% block content %}{% endblock %}
      </main>
    </div>

    <!-- Bottom tabs (mobile) -->
    <nav class="bottom-tabs" aria-label="Main navigation">
      <a href="/chat" class="tab-item{% if active_page == "chat" %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Chat
      </a>
      <a href="/traces" class="tab-item{% if active_page == "traces" %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        Traces
      </a>
      <a href="/analytics" class="tab-item{% if active_page == "analytics" %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        Dash
      </a>
      <a href="/logs" class="tab-item{% if active_page == "logs" %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
        </svg>
        Logs
      </a>
      <a href="/agents" class="tab-item{% if active_page == "agents" %} active{% endif %}{% if active_page == "webhooks" %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="3"/>
        </svg>
        More
      </a>
    </nav>
  </div>

  <!-- Slide-over drawer (tablet) -->
  <div class="drawer-backdrop" id="drawerBackdrop"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-header">
      <span class="drawer-brand">Assistant</span>
      <button class="drawer-close">&times;</button>
    </div>
    <nav class="drawer-nav">
      <a href="/chat" class="drawer-nav-item{% if active_page == "chat" %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Chat
      </a>
      <div class="drawer-divider"></div>
      <a href="/traces" class="drawer-nav-item{% if active_page == "traces" %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        Traces
      </a>
      <a href="/logs" class="drawer-nav-item{% if active_page == "logs" %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
        Logs
      </a>
      <a href="/analytics" class="drawer-nav-item{% if active_page == "analytics" %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        Analytics
      </a>
      <div class="drawer-divider"></div>
      <a href="/agents" class="drawer-nav-item{% if active_page == "agents" %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="3"/>
        </svg>
        Agents
      </a>
      <a href="/webhooks" class="drawer-nav-item{% if active_page == "webhooks" %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        Webhooks
      </a>
    </nav>
    <div class="drawer-divider"></div>
    {% block drawer_extra %}{% endblock %}
    <div style="margin-top:auto">
      <form method="POST" action="/logout">
        <button type="submit" class="btn-signout" style="width:100%">Sign out</button>
      </form>
    </div>
  </aside>

  <script src="{{ self.app_js_url() }}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
