<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Assistant</title>
  <style>
    {% include "partials/default_css.html" %}

    .login-container {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
    }
    .login-card {
        background: #0a1628;
        border: 1px solid #0b1b32;
        border-radius: 12px;
        padding: 2.5rem;
        width: 100%;
        max-width: 400px;
    }
    .login-brand {
        margin-bottom: 2rem;
    }
    .login-brand p {
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #7aa2ff;
        margin: 0 0 0.2rem;
        font-size: 0.75rem;
    }
    .login-brand h2 {
        margin: 0;
        color: #e5e9f0;
    }
    .login-error {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #fca5a5;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        margin-bottom: 1.5rem;
        font-size: 0.9rem;
    }
    .login-form {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
    }
    .login-form label {
        font-size: 0.85rem;
        color: #8aa5d8;
        text-transform: uppercase;
        letter-spacing: 0.08em;
    }
    .login-form input {
        background: #030712;
        border: 1px solid #1a2744;
        border-radius: 8px;
        padding: 0.7rem 1rem;
        color: #e5e9f0;
        font-size: 1rem;
        outline: none;
        transition: border-color 0.15s;
    }
    .login-form input:focus {
        border-color: #6ec6ff;
    }
    .login-form button {
        background: #2563eb;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 0.7rem;
        font-size: 1rem;
        cursor: pointer;
        margin-top: 0.5rem;
        transition: background 0.15s;
    }
    .login-form button:hover {
        background: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-brand">
        <p>assistant</p>
        <h2>Agent Manager</h2>
      </div>
      {% if let Some(error) = error %}
      <div class="login-error" id="login-error" role="alert">{{ error }}</div>
      {% endif %}
      <form method="POST" action="/login" class="login-form">
        <label for="token">Auth Token</label>
        <input type="password" id="token" name="token" placeholder="Enter your token" required autofocus{% if error.is_some() %} aria-describedby="login-error"{% endif %}>
        <button type="submit">Sign in</button>
      </form>
    </div>
  </div>
</body>
</html>
