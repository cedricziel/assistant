[package]
name = "assistant-interface-slack"
version = "0.1.0"
edition = "2021"

# The "slack" feature gates the actual Slack (slack-morphism) integration.
# Build with:
#   cargo build -p assistant-interface-slack --features slack
[features]
slack = ["dep:slack-morphism"]

[dependencies]
assistant-core = { path = "../core" }
assistant-runtime = { path = "../runtime" }
assistant-storage = { path = "../storage" }
assistant-llm = { path = "../llm" }
assistant-skills-executor = { path = "../skills-executor" }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
uuid = { workspace = true }
dirs = "6"
toml = "1.0"
clap = { version = "4", features = ["derive"] }
slack-morphism = { version = "2", optional = true }

[[bin]]
name = "assistant-slack"
path = "src/main.rs"
