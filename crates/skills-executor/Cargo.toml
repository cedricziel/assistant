[package]
name = "assistant-skills-executor"
version = "0.1.0"
edition = "2021"

[dependencies]
assistant-core = { path = "../core" }
assistant-llm = { path = "../llm" }
assistant-storage = { path = "../storage" }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
async-trait = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
# HTTP for web-fetch builtin
reqwest = { version = "0.12", features = ["rustls-tls"], default-features = false }
# HTML stripping for web-fetch
scraper = "0.25"
# cron expression parsing for schedule-task
cron = "0.15"
# home directory
dirs = "6"
# WASM plugin execution via extism
extism = "1"
