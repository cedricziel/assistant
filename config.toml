# Default configuration for the AI assistant
# Copy to ~/.assistant/config.toml and customize

[llm]
# LLM backend provider.  Options: "ollama" (default, local), "anthropic" (cloud), "openai" (cloud).
provider = "ollama"
# Model to use for inference.
# Ollama models — requires native tool-calling support. Recommended choices (2026):
#
#   ≤ 8 GB VRAM  — qwen2.5:7b (default), llama3.1:8b, mistral:7b-instruct-v0.3
#   ≤ 12 GB VRAM — qwen2.5:14b (recommended upgrade), deepseek-r1:14b, phi4:14b
#   ≤ 24 GB VRAM — qwen2.5:32b
#
# Use Q4_K_M quantization for 14 B+ models.
model = "qwen2.5:7b"
# Ollama API base URL
base_url = "http://localhost:11434"
# Maximum tool-calling iterations per turn
max_iterations = 80
# Timeout for LLM calls (seconds)
timeout_secs = 120

# ── Anthropic cloud provider ──────────────────────────────────────────────────
# To use Claude instead of a local Ollama model, replace the [llm] block above
# with (or uncomment) the following:
#
# [llm]
# provider  = "anthropic"
# model     = "claude-opus-4-6"     # or claude-sonnet-4-6, claude-haiku-4-5-20251001
# api_key   = "sk-ant-..."          # or set ANTHROPIC_API_KEY env var
# max_iterations = 80
# timeout_secs   = 120
#
# # Optional: enable Anthropic's hosted web search tool
# [llm.anthropic.web_search]
# enabled = true           # enabled by default; set to false to disable
# max_uses = 3
# allowed_domains = ["example.com"]
# blocked_domains = []
#
# [llm.anthropic.web_search.user_location]
# type = "approximate"
# city = "San Francisco"
# region = "California"
# country = "US"
# timezone = "America/Los_Angeles"
#
# # Optional: enable Anthropic's hosted web fetch tool
# [llm.anthropic.web_fetch]
# enabled = true           # enabled by default; set to false to disable
# max_uses = 10
# max_content_tokens = 100000
# allowed_domains = []
# blocked_domains = []
# citations.enabled = true

# ── Dedicated embedding provider ──────────────────────────────────────────────
# Ollama and OpenAI support embeddings natively — no extra config needed.
# For Anthropic (which has no built-in embeddings), or when you want a
# specialised embedding model, add an [llm.embeddings] section.
#
# Supported providers: "ollama", "openai", "voyage"
# API keys fall back to env vars: OPENAI_API_KEY, VOYAGE_API_KEY
#
# Voyage AI (recommended by Anthropic):
# [llm.embeddings]
# provider = "voyage"
# model    = "voyage-3-lite"          # default; also voyage-3, voyage-3-large
# # api_key = "pa-..."               # or set VOYAGE_API_KEY env var
#
# Ollama (use your local server for embeddings while chatting via Anthropic):
# [llm.embeddings]
# provider = "ollama"
# model    = "nomic-embed-text"       # default
# base_url = "http://localhost:11434"
#
# OpenAI:
# [llm.embeddings]
# provider = "openai"
# model    = "text-embedding-3-small" # default; also text-embedding-3-large
# # api_key = "sk-..."               # or set OPENAI_API_KEY env var

# ── OpenAI cloud provider ─────────────────────────────────────────────────────
# To use OpenAI instead of a local Ollama model, replace the [llm] block above
# with (or uncomment) the following:
#
# [llm]
# provider        = "openai"
# model           = "gpt-4o"          # or gpt-4.1, gpt-4o-mini, o3-mini, o3
# api_key         = "sk-..."          # or set OPENAI_API_KEY env var
# max_iterations  = 80
# timeout_secs    = 120
# embedding_model = "text-embedding-3-small"
#
# [llm.openai]
# max_tokens = 8192                   # max_completion_tokens per response
#
# # Alternative: OAuth PKCE mode for Codex subscriptions (billed against
# # your ChatGPT plan quota instead of API credits).
# # [llm.openai]
# # auth_mode       = "oauth"
# # oauth_client_id = "your-client-id"
# # max_tokens      = 8192
#
# The base_url setting also works with OpenAI-compatible APIs:
# base_url = "https://openrouter.ai/api/v1"        # OpenRouter
# base_url = "http://localhost:8000/v1"             # vLLM / LM Studio
# See docs/openai.md for full details.

[storage]
# Path to SQLite database (~/.assistant/assistant.db by default)
# db_path = "~/.assistant/assistant.db"

[skills]
# Directories to scan for skills (highest priority first):
# 1. entries from extra_dirs (defaults target Claude Code/NanoClaw folders)
# 2. ~/.assistant/skills/ (user personal)
# 3. <project>/.assistant/skills/ (project-scoped, auto-detected)
# 4. <binary dir>/skills/ (built-in sidecar, optional)

# Extra skill directories to include.  Paths may be absolute, use ~/ for home,
# or be relative to the current project directory.  By default the assistant
# also scans ~/.claude/skills and ./.claude/skills so Claude Code / NanoClaw
# skills are picked up automatically.
# extra_dirs = ["~/.claude/skills", "./.claude/skills"]

# Skills to disable (by name)
# disabled = []

[mcp]
# Enable the MCP server
enabled = true
# Listen address for MCP server
listen = "127.0.0.1:3000"

[self_improvement]
# Enable passive execution trace collection
trace_enabled = true
# How many recent traces to include in self-analysis (per skill)
analysis_window = 50
# Record full message content on LLM spans (system prompt, input messages,
# output messages, tool definitions).  Off by default — content may contain PII.
# trace_content = false

[memory]
# Persistent markdown memory files.
# When enabled, AGENTS.md / SOUL.md / IDENTITY.md / USER.md / TOOLS.md /
# MEMORY.md are read at the start of every turn and injected as the system
# prompt. Defaults are written to ~/.assistant/ on first run.

# enabled = true
# agents_path = "~/.assistant/AGENTS.md"
# soul_path = "~/.assistant/SOUL.md"
# identity_path = "~/.assistant/IDENTITY.md"
# user_path = "~/.assistant/USER.md"
# tools_path = "~/.assistant/TOOLS.md"
# memory_path = "~/.assistant/MEMORY.md"
# notes_dir = "~/.assistant/memory"
# bootstrap_path = "~/.assistant/BOOTSTRAP.md"
# heartbeat_path = "~/.assistant/HEARTBEAT.md"
# boot_path = "~/.assistant/BOOT.md"

[signal]
# Signal interface settings (only used if compiled with --features signal)
# phone_number = "+1234567890"
# allowed_senders = []   # If set, only these numbers can interact with the bot
