# Default configuration for the AI assistant
# Copy to ~/.assistant/config.toml and customize

[llm]
# Ollama model to use for inference.
# Requires native tool-calling support. Recommended choices (2026):
#
#   ≤ 8 GB VRAM  — qwen2.5:7b (default), llama3.1:8b, mistral:7b-instruct-v0.3
#   ≤ 12 GB VRAM — qwen2.5:14b (recommended upgrade), deepseek-r1:14b, phi4:14b
#   ≤ 24 GB VRAM — qwen2.5:32b
#
# Use Q4_K_M quantization for 14 B+ models.
model = "qwen2.5:7b"
# Ollama API base URL
base_url = "http://localhost:11434"
# Maximum tool-calling iterations per turn
max_iterations = 10
# Timeout for LLM calls (seconds)
timeout_secs = 120

[storage]
# Path to SQLite database (~/.assistant/assistant.db by default)
# db_path = "~/.assistant/assistant.db"

[skills]
# Directories to scan for skills (in priority order):
# 1. ~/.assistant/skills/ (user personal)
# 2. <project>/.assistant/skills/ (project-scoped, auto-detected)
# 3. <binary dir>/skills/ (built-in, always included)

# Extra skill directories to include
# extra_dirs = []

# Skills to disable (by name)
# disabled = []

[mcp]
# Enable the MCP server
enabled = true
# Listen address for MCP server
listen = "127.0.0.1:3000"

[self_improvement]
# Enable passive execution trace collection
trace_enabled = true
# How many recent traces to include in self-analysis (per skill)
analysis_window = 50

[memory]
# Persistent markdown memory files.
# When enabled, SOUL.md / IDENTITY.md / USER.md / MEMORY.md are read at the
# start of every turn and injected as the system prompt.
# Defaults are written to ~/.assistant/ on first run.

# enabled = true
# soul_path = "~/.assistant/SOUL.md"
# identity_path = "~/.assistant/IDENTITY.md"
# user_path = "~/.assistant/USER.md"
# memory_path = "~/.assistant/MEMORY.md"
# notes_dir = "~/.assistant/memory"

[signal]
# Signal interface settings (only used if compiled with --features signal)
# phone_number = "+1234567890"
# allowed_senders = []   # If set, only these numbers can interact with the bot
