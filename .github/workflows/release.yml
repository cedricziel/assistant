name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: false
            archive_suffix: linux-x86_64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
            archive_suffix: linux-aarch64
          - target: aarch64-apple-darwin
            runner: macos-latest
            use_cross: false
            archive_suffix: macos-arm64
          - target: x86_64-apple-darwin
            runner: macos-13
            use_cross: false
            archive_suffix: macos-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -y && sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build assistant-cli
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p assistant-cli
          else
            cargo build --release --target ${{ matrix.target }} -p assistant-cli
          fi

      - name: Build mcp-server
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p assistant-mcp-server
          else
            cargo build --release --target ${{ matrix.target }} -p assistant-mcp-server
          fi

      - name: Build assistant-slack
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p assistant-interface-slack
          else
            cargo build --release --target ${{ matrix.target }} -p assistant-interface-slack
          fi

      - name: Build assistant-mattermost
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p assistant-interface-mattermost
          else
            cargo build --release --target ${{ matrix.target }} -p assistant-interface-mattermost
          fi

      - name: Build assistant-signal (non-fatal)
        continue-on-error: true
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p assistant-interface-signal --features signal
          else
            cargo build --release --target ${{ matrix.target }} -p assistant-interface-signal --features signal
          fi

      - name: Create archive
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          ARCHIVE="assistant-${TAG}-${{ matrix.archive_suffix }}"
          mkdir -p "${ARCHIVE}"

          # Copy main binaries
          cp "target/${{ matrix.target }}/release/assistant" "${ARCHIVE}/" || \
            cp "target/${{ matrix.target }}/release/assistant.exe" "${ARCHIVE}/" 2>/dev/null || true
          cp "target/${{ matrix.target }}/release/mcp-server" "${ARCHIVE}/" || \
            cp "target/${{ matrix.target }}/release/mcp-server.exe" "${ARCHIVE}/" 2>/dev/null || true

          # Copy interface binaries
          cp "target/${{ matrix.target }}/release/assistant-slack" "${ARCHIVE}/" 2>/dev/null || true
          cp "target/${{ matrix.target }}/release/assistant-slack.exe" "${ARCHIVE}/" 2>/dev/null || true
          cp "target/${{ matrix.target }}/release/assistant-mattermost" "${ARCHIVE}/" 2>/dev/null || true
          cp "target/${{ matrix.target }}/release/assistant-mattermost.exe" "${ARCHIVE}/" 2>/dev/null || true

          # Copy signal binary if it was built
          cp "target/${{ matrix.target }}/release/assistant-signal" "${ARCHIVE}/" 2>/dev/null || true
          cp "target/${{ matrix.target }}/release/assistant-signal.exe" "${ARCHIVE}/" 2>/dev/null || true

          # Copy config template
          cp config.toml "${ARCHIVE}/config.toml.example"

          tar czf "${ARCHIVE}.tar.gz" "${ARCHIVE}"
          echo "ARCHIVE=${ARCHIVE}.tar.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.archive_suffix }}
          path: ${{ env.ARCHIVE }}
          retention-days: 1

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}

  build-packages:
    name: Build OS packages (Linux x86_64)
    runs-on: ubuntu-latest
    needs: build-binaries

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux x86_64 binary
        uses: actions/download-artifact@v4
        with:
          name: binary-linux-x86_64
          path: ./dist

      - name: Extract binaries
        run: |
          cd dist
          ARCHIVE=$(ls *.tar.gz | head -1)
          tar xzf "${ARCHIVE}"
          ARCHIVE_DIR="${ARCHIVE%.tar.gz}"
          echo "BIN_DIR=dist/${ARCHIVE_DIR}" >> $GITHUB_ENV

      - name: Install nfpm
        run: |
          curl -sfL https://install.goreleaser.com/github.com/goreleaser/nfpm.sh | sh -s v2.38.0
          sudo mv ./bin/nfpm /usr/local/bin/

      - name: Create nfpm config for assistant
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          cat > nfpm-assistant.yaml << EOF
          name: "assistant"
          arch: "amd64"
          platform: "linux"
          version: "${VERSION}"
          maintainer: "Cedric Ziel <cedric@cedric-ziel.com>"
          description: "Local self-improving AI assistant CLI"
          homepage: "https://github.com/cedricziel/assistant"
          license: "MIT"
          contents:
            - src: ${{ env.BIN_DIR }}/assistant
              dst: /usr/local/bin/assistant
              file_info:
                mode: 0755
            - src: ${{ env.BIN_DIR }}/config.toml.example
              dst: /etc/assistant/config.toml.example
              type: config|noreplace
          EOF

      - name: Create nfpm config for mcp-server
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          cat > nfpm-mcp-server.yaml << EOF
          name: "assistant-mcp-server"
          arch: "amd64"
          platform: "linux"
          version: "${VERSION}"
          maintainer: "Cedric Ziel <cedric@cedric-ziel.com>"
          description: "MCP server exposing assistant skills to Claude Code and other clients"
          homepage: "https://github.com/cedricziel/assistant"
          license: "MIT"
          contents:
            - src: ${{ env.BIN_DIR }}/mcp-server
              dst: /usr/local/bin/assistant-mcp-server
              file_info:
                mode: 0755
          EOF

      - name: Create nfpm config for assistant-slack
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          cat > nfpm-assistant-slack.yaml << EOF
          name: "assistant-slack"
          arch: "amd64"
          platform: "linux"
          version: "${VERSION}"
          maintainer: "Cedric Ziel <cedric@cedric-ziel.com>"
          description: "Slack Socket Mode interface for the AI assistant"
          homepage: "https://github.com/cedricziel/assistant"
          license: "MIT"
          contents:
            - src: ${{ env.BIN_DIR }}/assistant-slack
              dst: /usr/local/bin/assistant-slack
              file_info:
                mode: 0755
            - src: ${{ env.BIN_DIR }}/config.toml.example
              dst: /etc/assistant/config.toml.example
              type: config|noreplace
          EOF

      - name: Create nfpm config for assistant-mattermost
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          cat > nfpm-assistant-mattermost.yaml << EOF
          name: "assistant-mattermost"
          arch: "amd64"
          platform: "linux"
          version: "${VERSION}"
          maintainer: "Cedric Ziel <cedric@cedric-ziel.com>"
          description: "Mattermost WebSocket interface for the AI assistant"
          homepage: "https://github.com/cedricziel/assistant"
          license: "MIT"
          contents:
            - src: ${{ env.BIN_DIR }}/assistant-mattermost
              dst: /usr/local/bin/assistant-mattermost
              file_info:
                mode: 0755
            - src: ${{ env.BIN_DIR }}/config.toml.example
              dst: /etc/assistant/config.toml.example
              type: config|noreplace
          EOF

      - name: Build .deb packages
        run: |
          nfpm package --config nfpm-assistant.yaml --packager deb --target ./dist/
          nfpm package --config nfpm-mcp-server.yaml --packager deb --target ./dist/
          nfpm package --config nfpm-assistant-slack.yaml --packager deb --target ./dist/
          nfpm package --config nfpm-assistant-mattermost.yaml --packager deb --target ./dist/

      - name: Build .rpm packages
        run: |
          nfpm package --config nfpm-assistant.yaml --packager rpm --target ./dist/
          nfpm package --config nfpm-mcp-server.yaml --packager rpm --target ./dist/
          nfpm package --config nfpm-assistant-slack.yaml --packager rpm --target ./dist/
          nfpm package --config nfpm-assistant-mattermost.yaml --packager rpm --target ./dist/

      - name: Upload packages to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.rpm
