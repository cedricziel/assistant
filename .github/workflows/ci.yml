name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get update -y && sudo apt-get install -y protobuf-compiler

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo check
        run: cargo check --workspace --all-features

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo test
        run: cargo test --workspace

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install protoc
        run: sudo apt-get update -y && sudo apt-get install -y protobuf-compiler

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

      - name: cargo clippy (signal feature)
        run: cargo clippy -p assistant-interface-signal --features signal -- -D warnings

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt
        run: cargo fmt --all -- --check

  visual-regression:
    name: Visual Regression
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build web-ui binary
        run: cargo build -p assistant-web-ui

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Playwright dependencies
        working-directory: crates/web-ui/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run visual regression tests
        id: playwright
        working-directory: crates/web-ui/e2e
        continue-on-error: true
        run: npx playwright test

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: crates/web-ui/e2e/playwright-report/
          retention-days: 14

      - name: Upload diff images
        if: steps.playwright.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diff-images
          path: crates/web-ui/e2e/test-results/
          retention-days: 14

      - name: Post visual diff comment on PR
        if: steps.playwright.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Collect pages that changed by scanning for diff images
            const testResults = 'crates/web-ui/e2e/test-results';
            const changed = [];

            function walk(dir) {
              if (!fs.existsSync(dir)) return;
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const full = path.join(dir, entry.name);
                if (entry.isDirectory()) walk(full);
                else if (entry.name.endsWith('-diff.png')) {
                  const rel = path.relative(testResults, path.dirname(full));
                  changed.push(rel.replace(/-retry\d+$/, '').replace(/-/g, ' '));
                }
              }
            }
            walk(testResults);

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let body = '## Visual Changes Detected\n\n';
            body += 'This PR changes the visual appearance of the following pages. ';
            body += 'This is expected when the frontend evolves — just verify the ';
            body += 'new look is intentional.\n\n';

            if (changed.length > 0) {
              body += '| Page | |\n|------|---|\n';
              for (const name of changed) {
                body += `| ${name} | changed |\n`;
              }
              body += '\n';
            }

            body += '### Reviewing the diff\n\n';
            body += `1. Download the **playwright-report** artifact from the [CI run](${runUrl})\n`;
            body += '2. Unzip and open `index.html` — each failed test has a **side-by-side slider** showing baseline vs this PR\n';
            body += '3. The **playwright-diff-images** artifact contains the raw expected / actual / diff PNGs\n\n';
            body += '### Accepting the changes\n\n';
            body += 'If the new appearance is correct, update the baselines:\n\n';
            body += '```sh\ncd crates/web-ui/e2e\nnpm run test:update\n```\n\n';
            body += 'Then commit the updated screenshots.\n';

            // Upsert: update existing comment or create a new one
            const marker = '<!-- visual-regression-report -->';
            body = marker + '\n' + body;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Clear stale visual diff comment
        if: steps.playwright.outcome == 'success' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- visual-regression-report -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: marker + '\n## Visual Regression Report\n\nNo visual changes detected — all pages match their baselines.',
              });
            }

  integration:
    name: Integration (smoke)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache Ollama model
        uses: actions/cache@v5
        with:
          path: ~/.ollama/models
          key: ollama-qwen2.5-1.5b

      - name: Run smoke tests
        run: make test-integration
