name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: false
            archive_suffix: linux-x86_64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
            archive_suffix: linux-aarch64
          - target: aarch64-apple-darwin
            runner: macos-latest
            use_cross: false
            archive_suffix: macos-arm64
          - target: x86_64-apple-darwin
            runner: macos-latest
            use_cross: false
            archive_suffix: macos-x86_64

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -y && sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Vendor JS dependencies
        run: make vendor

      - name: Build assistant-cli (unified binary)
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p assistant-cli
          else
            cargo build --release --target ${{ matrix.target }} -p assistant-cli
          fi

      - name: Build assistant-web-ui
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p assistant-web-ui
          else
            cargo build --release --target ${{ matrix.target }} -p assistant-web-ui
          fi

      - name: Build assistant-signal (non-fatal)
        continue-on-error: true
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p assistant-interface-signal --features signal
          else
            cargo build --release --target ${{ matrix.target }} -p assistant-interface-signal --features signal
          fi

      - name: Create archive
        shell: bash
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          ARCHIVE="assistant-${TAG}-${{ matrix.archive_suffix }}"
          mkdir -p "${ARCHIVE}"

          # Copy unified binary (Slack, Mattermost, MCP are subcommands of `assistant`)
          cp "target/${{ matrix.target }}/release/assistant" "${ARCHIVE}/" || \
            cp "target/${{ matrix.target }}/release/assistant.exe" "${ARCHIVE}/" 2>/dev/null || true

          # Copy web-ui binary
          cp "target/${{ matrix.target }}/release/assistant-web-ui" "${ARCHIVE}/" || \
            cp "target/${{ matrix.target }}/release/assistant-web-ui.exe" "${ARCHIVE}/" 2>/dev/null || true

          # Copy signal binary if it was built (still a separate feature-gated binary)
          cp "target/${{ matrix.target }}/release/assistant-signal" "${ARCHIVE}/" 2>/dev/null || true
          cp "target/${{ matrix.target }}/release/assistant-signal.exe" "${ARCHIVE}/" 2>/dev/null || true

          # Copy config template
          cp config.toml "${ARCHIVE}/config.toml.example"

          tar czf "${ARCHIVE}.tar.gz" "${ARCHIVE}"
          echo "ARCHIVE=${ARCHIVE}.tar.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.archive_suffix }}
          path: ${{ env.ARCHIVE }}
          retention-days: 1

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} ${{ env.ARCHIVE }}

  build-packages:
    name: Build OS packages (Linux x86_64 + aarch64)
    runs-on: ubuntu-latest
    needs: [release-please, build-binaries]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}

    steps:
      - uses: actions/checkout@v6

      - name: Download Linux x86_64 binary
        uses: actions/download-artifact@v8
        with:
          name: binary-linux-x86_64
          path: ./dist/x86_64

      - name: Download Linux aarch64 binary
        uses: actions/download-artifact@v8
        with:
          name: binary-linux-aarch64
          path: ./dist/aarch64

      - name: Extract binaries
        run: |
          cd dist/x86_64
          ARCHIVE=$(ls *.tar.gz | head -1)
          tar xzf "${ARCHIVE}"
          echo "BIN_DIR_X86=dist/x86_64/${ARCHIVE%.tar.gz}" >> $GITHUB_ENV

          cd ../aarch64
          ARCHIVE=$(ls *.tar.gz | head -1)
          tar xzf "${ARCHIVE}"
          echo "BIN_DIR_ARM64=dist/aarch64/${ARCHIVE%.tar.gz}" >> $GITHUB_ENV

      - name: Install nfpm
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt update
          sudo apt install -y nfpm

      - name: Build x86_64 packages
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          VERSION="${TAG#v}"
          sed \
            -e "s|VERSION_PLACEHOLDER|${VERSION}|g" \
            -e "s|BIN_DIR_PLACEHOLDER|${BIN_DIR_X86}|g" \
            -e "s|ARCH_PLACEHOLDER|amd64|g" \
            packaging/nfpm-assistant.yaml.tpl > nfpm-amd64.yaml
          nfpm package --config nfpm-amd64.yaml --packager deb --target ./dist/
          nfpm package --config nfpm-amd64.yaml --packager rpm --target ./dist/

      - name: Build arm64 packages
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          VERSION="${TAG#v}"
          sed \
            -e "s|VERSION_PLACEHOLDER|${VERSION}|g" \
            -e "s|BIN_DIR_PLACEHOLDER|${BIN_DIR_ARM64}|g" \
            -e "s|ARCH_PLACEHOLDER|arm64|g" \
            packaging/nfpm-assistant.yaml.tpl > nfpm-arm64.yaml
          nfpm package --config nfpm-arm64.yaml --packager deb --target ./dist/
          nfpm package --config nfpm-arm64.yaml --packager rpm --target ./dist/

      - name: Upload packages to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} dist/*.deb dist/*.rpm

      - name: Upload packages artifact
        uses: actions/upload-artifact@v7
        with:
          name: packages-linux
          path: |
            dist/*.deb
            dist/*.rpm
          retention-days: 1

  publish-repo:
    name: Publish APT/YUM repo to GitHub Pages
    runs-on: ubuntu-latest
    needs: [release-please, build-packages]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install repo tools
        run: sudo apt-get update -y && sudo apt-get install -y dpkg-dev createrepo-c

      - name: Download packages artifact
        uses: actions/download-artifact@v8
        with:
          name: packages-linux
          path: ./new-packages

      - name: Bootstrap gh-pages branch (first run only)
        run: |
          if ! git ls-remote --exit-code --heads origin gh-pages; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git switch --orphan gh-pages
            touch .nojekyll
            git add .nojekyll
            git commit -m "chore: initialise package repository"
            git push origin gh-pages
            git switch -
          fi

      - name: Check out gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add .deb packages and regenerate APT index
        run: |
          mkdir -p repo/apt
          rm -f repo/apt/*.deb
          cp new-packages/*.deb repo/apt/
          cd repo/apt
          dpkg-scanpackages . > Packages
          gzip -k -f Packages

      - name: Add .rpm packages and regenerate YUM index
        run: |
          mkdir -p repo/rpm
          rm -f repo/rpm/*.rpm
          cp new-packages/*.rpm repo/rpm/
          rm -rf repo/rpm/repodata
          createrepo_c repo/rpm/

      - name: Ensure .nojekyll
        run: touch repo/.nojekyll

      - name: Write install-instructions page
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          cat > repo/index.html << 'HTMLDOC'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>assistant – package repository</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
              pre  { background: #1e1e1e; color: #d4d4d4; padding: 1rem; border-radius: 6px; overflow-x: auto; font-size: .9rem; }
              h2   { margin-top: 2rem; border-bottom: 1px solid #e0e0e0; padding-bottom: .4rem; }
              a    { color: #0066cc; }
            </style>
          </head>
          <body>
            <h1>assistant</h1>
            <p>Local self-improving AI assistant. Latest: <strong>TAG_PLACEHOLDER</strong></p>

            <h2>APT &ndash; Debian / Ubuntu</h2>
            <pre>echo "deb [trusted=yes] https://cedricziel.github.io/assistant/apt ./" | sudo tee /etc/apt/sources.list.d/assistant.list
          sudo apt update &amp;&amp; sudo apt install assistant</pre>

            <h2>YUM / DNF &ndash; Fedora / RHEL / Rocky</h2>
            <pre>sudo tee /etc/yum.repos.d/assistant.repo &lt;&lt; 'EOF'
          [assistant]
          name=assistant
          baseurl=https://cedricziel.github.io/assistant/rpm/
          enabled=1
          gpgcheck=0
          EOF
          sudo dnf install assistant</pre>

            <h2>Tarball</h2>
            <p>Pre-built tarballs for Linux (x86_64, aarch64) and macOS (arm64, x86_64) are available on the
              <a href="https://github.com/cedricziel/assistant/releases">GitHub Releases</a> page.</p>
          </body>
          </html>
          HTMLDOC
          sed -i "s/TAG_PLACEHOLDER/${TAG}/" repo/index.html

      - name: Commit and force-push (single orphan commit keeps branch small)
        run: |
          cd repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan tmp-pages
          git add -A
          git commit -m "chore: update package repo for ${{ needs.release-please.outputs.tag_name }}"
          git push --force origin tmp-pages:gh-pages
