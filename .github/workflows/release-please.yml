name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: false
            archive_suffix: linux-x86_64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
            archive_suffix: linux-aarch64
          - target: aarch64-apple-darwin
            runner: macos-latest
            use_cross: false
            archive_suffix: macos-arm64
          - target: x86_64-apple-darwin
            runner: macos-latest
            use_cross: false
            archive_suffix: macos-x86_64

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -y && sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build assistant-cli (unified binary)
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p assistant-cli
          else
            cargo build --release --target ${{ matrix.target }} -p assistant-cli
          fi

      - name: Build assistant-signal (non-fatal)
        continue-on-error: true
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p assistant-interface-signal --features signal
          else
            cargo build --release --target ${{ matrix.target }} -p assistant-interface-signal --features signal
          fi

      - name: Create archive
        shell: bash
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          ARCHIVE="assistant-${TAG}-${{ matrix.archive_suffix }}"
          mkdir -p "${ARCHIVE}"

          # Copy unified binary (Slack, Mattermost, MCP are subcommands of `assistant`)
          cp "target/${{ matrix.target }}/release/assistant" "${ARCHIVE}/" || \
            cp "target/${{ matrix.target }}/release/assistant.exe" "${ARCHIVE}/" 2>/dev/null || true

          # Copy signal binary if it was built (still a separate feature-gated binary)
          cp "target/${{ matrix.target }}/release/assistant-signal" "${ARCHIVE}/" 2>/dev/null || true
          cp "target/${{ matrix.target }}/release/assistant-signal.exe" "${ARCHIVE}/" 2>/dev/null || true

          # Copy config template
          cp config.toml "${ARCHIVE}/config.toml.example"

          tar czf "${ARCHIVE}.tar.gz" "${ARCHIVE}"
          echo "ARCHIVE=${ARCHIVE}.tar.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: binary-${{ matrix.archive_suffix }}
          path: ${{ env.ARCHIVE }}
          retention-days: 1

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} ${{ env.ARCHIVE }}

  build-packages:
    name: Build OS packages (Linux x86_64)
    runs-on: ubuntu-latest
    needs: [release-please, build-binaries]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}

    steps:
      - uses: actions/checkout@v6

      - name: Download Linux x86_64 binary
        uses: actions/download-artifact@v7
        with:
          name: binary-linux-x86_64
          path: ./dist

      - name: Extract binaries
        run: |
          cd dist
          ARCHIVE=$(ls *.tar.gz | head -1)
          tar xzf "${ARCHIVE}"
          ARCHIVE_DIR="${ARCHIVE%.tar.gz}"
          echo "BIN_DIR=dist/${ARCHIVE_DIR}" >> $GITHUB_ENV

      - name: Install nfpm
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt update
          sudo apt install -y nfpm

      - name: Create nfpm config for assistant
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          VERSION="${TAG#v}"
          sed \
            -e "s|VERSION_PLACEHOLDER|${VERSION}|g" \
            -e "s|BIN_DIR_PLACEHOLDER|${BIN_DIR}|g" \
            packaging/nfpm-assistant.yaml.tpl > nfpm-assistant.yaml

      - name: Build .deb packages
        run: |
          nfpm package --config nfpm-assistant.yaml --packager deb --target ./dist/

      - name: Build .rpm packages
        run: |
          nfpm package --config nfpm-assistant.yaml --packager rpm --target ./dist/

      - name: Upload packages to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} dist/*.deb dist/*.rpm
