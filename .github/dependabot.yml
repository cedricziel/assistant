version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      opentelemetry:
        patterns:
          - "opentelemetry*"
      reqwest:
        patterns:
          - "reqwest*"

  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly
      day: monday
    groups:
      all-docker:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      all-actions:
        patterns:
          - "*"
